<!DOCTYPE html>
<html>
<head><title>Icon Generator</title></head>
<body>
<canvas id="c"></canvas>
<script>
// Generate PhishLens Guard icons and save them as base64 PNG data URIs
// Sizes: 16, 48, 128

function generateIcon(size) {
  const canvas = document.getElementById('c');
  canvas.width = size;
  canvas.height = size;
  const ctx = canvas.getContext('2d');

  const r = size * 0.5;
  const cx = size / 2;
  const cy = size / 2;

  // Background gradient
  const bg = ctx.createRadialGradient(cx, cy * 0.8, 0, cx, cy, r);
  bg.addColorStop(0, '#3b82f6');
  bg.addColorStop(1, '#1d4ed8');

  // Rounded rect background
  const pad = size * 0.08;
  const radius = size * 0.22;
  ctx.beginPath();
  ctx.moveTo(pad + radius, pad);
  ctx.lineTo(size - pad - radius, pad);
  ctx.quadraticCurveTo(size - pad, pad, size - pad, pad + radius);
  ctx.lineTo(size - pad, size - pad - radius);
  ctx.quadraticCurveTo(size - pad, size - pad, size - pad - radius, size - pad);
  ctx.lineTo(pad + radius, size - pad);
  ctx.quadraticCurveTo(pad, size - pad, pad, size - pad - radius);
  ctx.lineTo(pad, pad + radius);
  ctx.quadraticCurveTo(pad, pad, pad + radius, pad);
  ctx.closePath();
  ctx.fillStyle = bg;
  ctx.fill();

  // Draw magnifying glass
  const glassR = size * 0.22;
  const glassX = cx - size * 0.04;
  const glassY = cy - size * 0.04;
  const handleLen = size * 0.18;
  const lineW = Math.max(1.5, size * 0.07);

  ctx.strokeStyle = 'white';
  ctx.lineWidth = lineW;
  ctx.lineCap = 'round';

  // Circle
  ctx.beginPath();
  ctx.arc(glassX, glassY, glassR, 0, Math.PI * 2);
  ctx.stroke();

  // Handle
  const angle = Math.PI * 0.75;
  const hx1 = glassX + Math.cos(angle) * glassR;
  const hy1 = glassY + Math.sin(angle) * glassR;
  const hx2 = hx1 + Math.cos(angle) * handleLen;
  const hy2 = hy1 + Math.sin(angle) * handleLen;
  ctx.beginPath();
  ctx.moveTo(hx1, hy1);
  ctx.lineTo(hx2, hy2);
  ctx.stroke();

  // Shield accent (small bottom right dot for "guard" feel)
  if (size >= 48) {
    ctx.fillStyle = '#fbbf24';
    ctx.beginPath();
    ctx.arc(size - pad - size * 0.08, size - pad - size * 0.08, size * 0.07, 0, Math.PI * 2);
    ctx.fill();
  }

  return canvas.toDataURL('image/png');
}

const sizes = [16, 48, 128];
const results = {};
sizes.forEach(s => { results[s] = generateIcon(s); });

// Output as JSON so we can extract
document.body.innerHTML = '<pre id="out">' + JSON.stringify({
  icon16: results[16],
  icon48: results[48],
  icon128: results[128]
}) + '</pre>';

console.log('ICONS_READY');
</script>
</body>
</html>
